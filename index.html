<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <script>
      (() => {
        const root = document.documentElement;
        const storedTheme = localStorage.getItem('theme');
        const theme = storedTheme === 'light' || storedTheme === 'dark' ? storedTheme : 'dark';

        root.setAttribute('data-theme', theme);
        root.style.colorScheme = theme;

        const setFavicon = (currentTheme) => {
          const color = currentTheme === 'dark' ? '#38bdf8' : '#0ea5e9';
          const svg = `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64"><text x="50%" y="50%" text-anchor="middle" dominant-baseline="middle" font-family="ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, 'Liberation Mono', 'Courier New', monospace" font-size="44" font-weight="700" fill="${color}">{}</text></svg>`;
          const href = `data:image/svg+xml,${encodeURIComponent(svg)}`;
          let icon = document.querySelector('link[rel="icon"]');
          if (!icon) {
            icon = document.createElement('link');
            icon.rel = 'icon';
            icon.type = 'image/svg+xml';
            document.head.appendChild(icon);
          }
          icon.href = href;
        };

        window.__setThemeFavicon = setFavicon;
        setFavicon(theme);
      })();
    </script>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>portfolio-vite</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
