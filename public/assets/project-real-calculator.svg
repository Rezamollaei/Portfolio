<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" role="img" aria-label="Photo-style calculator on desk">
  <defs>
    <linearGradient id="desk-calc" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1f2937"/>
      <stop offset="100%" stop-color="#475569"/>
    </linearGradient>
    <linearGradient id="screen-calc" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#d1fae5"/>
      <stop offset="100%" stop-color="#99f6e4"/>
    </linearGradient>
    <filter id="shadow-calc" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="20" flood-color="#0f172a" flood-opacity="0.45"/>
    </filter>
  </defs>
  <rect width="1200" height="630" fill="url(#desk-calc)"/>
  <rect x="170" y="80" width="860" height="470" rx="40" fill="#111827" filter="url(#shadow-calc)"/>
  <rect x="250" y="140" width="700" height="110" rx="18" fill="url(#screen-calc)"/>
  <text x="880" y="212" font-family="Arial, sans-serif" font-size="76" font-weight="700" fill="#0f172a">728.16</text>
  <g fill="#e5e7eb">
    <rect x="250" y="285" width="140" height="80" rx="14"/>
    <rect x="415" y="285" width="140" height="80" rx="14"/>
    <rect x="580" y="285" width="140" height="80" rx="14"/>
    <rect x="745" y="285" width="140" height="80" rx="14"/>
    <rect x="250" y="380" width="140" height="80" rx="14"/>
    <rect x="415" y="380" width="140" height="80" rx="14"/>
    <rect x="580" y="380" width="140" height="80" rx="14"/>
    <rect x="745" y="380" width="140" height="80" rx="14"/>
  </g>
  <rect x="910" y="285" width="120" height="175" rx="16" fill="#14b8a6"/>
</svg>
