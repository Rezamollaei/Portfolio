<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" role="img" aria-label="Photo-style game setup with controller">
  <defs>
    <linearGradient id="bg-game" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#312e81"/>
    </linearGradient>
    <linearGradient id="pad-game" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1e293b"/>
      <stop offset="100%" stop-color="#334155"/>
    </linearGradient>
    <filter id="shadow-game" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="16" stdDeviation="18" flood-color="#020617" flood-opacity="0.5"/>
    </filter>
  </defs>
  <rect width="1200" height="630" fill="url(#bg-game)"/>
  <circle cx="180" cy="120" r="130" fill="#38bdf8" opacity="0.2"/>
  <circle cx="1030" cy="540" r="180" fill="#8b5cf6" opacity="0.2"/>
  <rect x="180" y="200" width="840" height="280" rx="140" fill="url(#pad-game)" filter="url(#shadow-game)"/>
  <circle cx="350" cy="340" r="76" fill="#0f172a"/>
  <rect x="338" y="292" width="24" height="96" rx="8" fill="#e2e8f0"/>
  <rect x="302" y="328" width="96" height="24" rx="8" fill="#e2e8f0"/>
  <circle cx="860" cy="305" r="24" fill="#f43f5e"/>
  <circle cx="915" cy="350" r="24" fill="#22c55e"/>
  <circle cx="805" cy="350" r="24" fill="#eab308"/>
  <circle cx="860" cy="395" r="24" fill="#3b82f6"/>
  <rect x="540" y="292" width="120" height="76" rx="20" fill="#111827"/>
  <circle cx="535" cy="230" r="18" fill="#94a3b8"/>
  <circle cx="665" cy="230" r="18" fill="#94a3b8"/>
</svg>
