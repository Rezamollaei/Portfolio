<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" role="img" aria-label="Photo-style desktop computer setup">
  <defs>
    <linearGradient id="wall-pc" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#e2e8f0"/>
      <stop offset="100%" stop-color="#cbd5e1"/>
    </linearGradient>
    <linearGradient id="screen-pc" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0ea5e9"/>
      <stop offset="100%" stop-color="#1d4ed8"/>
    </linearGradient>
    <filter id="shadow-pc" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="14" stdDeviation="16" flood-color="#0f172a" flood-opacity="0.35"/>
    </filter>
  </defs>
  <rect width="1200" height="630" fill="url(#wall-pc)"/>
  <rect y="470" width="1200" height="160" fill="#94a3b8"/>
  <rect x="170" y="90" width="860" height="370" rx="26" fill="#0f172a" filter="url(#shadow-pc)"/>
  <rect x="205" y="125" width="790" height="300" rx="14" fill="url(#screen-pc)"/>
  <g stroke="#93c5fd" stroke-width="5" fill="none" opacity="0.9">
    <path d="M250 350c90-100 190-100 280 0"/>
    <path d="M530 350c70-78 150-78 220 0"/>
    <path d="M760 350c55-60 115-60 170 0"/>
  </g>
  <rect x="540" y="460" width="120" height="38" rx="10" fill="#334155"/>
  <rect x="470" y="500" width="260" height="24" rx="12" fill="#1e293b"/>
  <rect x="320" y="520" width="560" height="20" rx="10" fill="#475569"/>
</svg>
